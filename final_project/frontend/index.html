<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>المساعد القانوني — Syrian Legal AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Cairo:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root {
  --gold:     #b8922a;
  --gold-lt:  #d4a843;
  --gold-dim: #7a5f1a;
  --deep:     #0f0e0c;
  --surface:  #1a1814;
  --surface2: #222018;
  --border:   rgba(184,146,42,0.15);
  --border2:  rgba(184,146,42,0.28);
  --muted:    #6a6050;
  --text:     #e8e0d0;
  --text-dim: #9a8e78;
  --r:        12px;
  --sidebar-w: 250px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; background: var(--deep); color: var(--text); font-family: 'Cairo', sans-serif; font-size: 15px; line-height: 1.75; overflow: hidden; }

/* ── Layout ── */
#app   { display: flex; height: 100vh; }
#shell { display: flex; flex-direction: column; flex: 1; min-width: 0; position: relative; }

/* ══ Sidebar ══════════════════════════════════════════════════ */
#sidebar {
  width: var(--sidebar-w);
  background: #110f0d;
  border-left: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  transition: width .25s;
  overflow: hidden;
}
#sidebar.collapsed { width: 0; border: none; }

.sb-head {
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.sb-head span { font-size: 12px; color: var(--gold); font-weight: 600; letter-spacing: .5px; }
.sb-new {
  padding: 4px 10px;
  border: 1px solid var(--border2);
  border-radius: 6px;
  background: rgba(184,146,42,0.05);
  color: var(--gold-dim);
  font-family: 'Cairo', sans-serif;
  font-size: 11px;
  cursor: pointer;
  transition: all .2s;
  white-space: nowrap;
}
.sb-new:hover { background: rgba(184,146,42,0.12); color: var(--gold-lt); }

#sessions-list { flex: 1; overflow-y: auto; padding: 8px; }
#sessions-list::-webkit-scrollbar { width: 2px; }
#sessions-list::-webkit-scrollbar-thumb { background: var(--border2); }

.sess-item {
  padding: 9px 12px;
  border-radius: 8px;
  cursor: pointer;
  transition: background .15s;
  border: 1px solid transparent;
  margin-bottom: 3px;
  list-style: none;
  display: block;
}
.sess-item:hover  { background: rgba(255,255,255,.04); }
.sess-item.active { background: rgba(184,146,42,0.08); border-color: var(--border); }
.sess-title { font-size: 12.5px; color: var(--text-dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.sess-item.active .sess-title { color: var(--text); }
.sess-time  { font-size: 10px; color: var(--muted); margin-top: 2px; }
.sess-del {
  display: none;
  background: none;
  border: none;
  color: var(--muted);
  cursor: pointer;
  font-size: 14px;
  padding: 2px 4px;
  border-radius: 4px;
  line-height: 1;
  flex-shrink: 0;
  transition: color .15s;
}
.sess-del:hover { color: #b85050; }
.sess-item:hover .sess-del { display: flex; align-items: center; }
.sess-row { display: flex; align-items: center; justify-content: space-between; gap: 4px; }

/* ── Header ── */
header { display: flex; align-items: center; gap: 12px; padding: 14px 24px; border-bottom: 1px solid var(--border); background: rgba(15,14,12,0.97); flex-shrink: 0; }
.logo { width: 38px; height: 38px; border: 1.5px solid var(--gold); border-radius: 9px; display: flex; align-items: center; justify-content: center; background: rgba(184,146,42,0.08); flex-shrink: 0; }
.header-text h1 { font-family: 'Amiri', serif; font-size: 18px; font-weight: 700; color: var(--gold-lt); line-height: 1.2; }
.header-text p { font-size: 11px; color: var(--muted); }
.badge { margin-right: auto; font-size: 10.5px; padding: 3px 10px; border: 1px solid var(--border2); border-radius: 20px; color: var(--gold-dim); background: rgba(184,146,42,0.05); }
.toggle-sb {
  padding: 5px 10px;
  border: 1px solid var(--border2);
  border-radius: 7px;
  background: rgba(184,146,42,0.05);
  color: var(--gold-dim);
  font-size: 12px;
  cursor: pointer;
  transition: all .2s;
  display: flex; align-items: center; gap: 5px;
}
.toggle-sb:hover { background: rgba(184,146,42,0.12); color: var(--gold-lt); }

/* ── Disclaimer ── */
.disc { background: rgba(184,146,42,0.04); border-bottom: 1px solid var(--border); padding: 7px 24px; font-size: 11px; color: var(--text-dim); display: flex; align-items: center; gap: 7px; flex-shrink: 0; }

/* ── Chat ── */
#chat { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 0; scroll-behavior: smooth; }
#chat::-webkit-scrollbar { width: 3px; }
#chat::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

/* ── Welcome ── */
#welcome { display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; gap: 16px; text-align: center; padding: 40px 20px; animation: fadeUp .5s ease both; }
.seal { width: 68px; height: 68px; border: 2px solid var(--gold); border-radius: 50%; display: flex; align-items: center; justify-content: center; background: rgba(184,146,42,0.07); box-shadow: 0 0 32px rgba(184,146,42,0.06); }
#welcome h2 { font-family: 'Amiri', serif; font-size: 22px; color: var(--gold-lt); }
#welcome .sub { font-size: 13px; color: var(--muted); max-width: 380px; line-height: 1.9; }
.chips { display: flex; flex-wrap: wrap; gap: 7px; justify-content: center; max-width: 540px; }
.chip { padding: 6px 14px; border: 1px solid var(--border2); border-radius: 20px; font-size: 12.5px; color: var(--text-dim); cursor: pointer; transition: all .2s; }
.chip:hover { border-color: var(--gold); color: var(--gold-lt); background: rgba(184,146,42,0.08); }

/* ── Messages ── */
.row { display: flex; gap: 10px; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,.025); animation: fadeUp .28s ease both; }
.row.user { flex-direction: row-reverse; }
.av { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.av.ai { background: rgba(184,146,42,0.14); border: 1px solid var(--border2); }
.av.us { background: rgba(255,255,255,.04); border: 1px solid rgba(255,255,255,.07); color: var(--muted); }
.bubble { max-width: 78%; padding: 12px 16px; border-radius: var(--r); font-size: 14px; line-height: 1.85; }
.row.user .bubble { background: #1d1b16; border: 1px solid rgba(255,255,255,.06); border-top-left-radius: 4px; }
.row.ai   .bubble { background: #141210; border: 1px solid var(--border); border-top-right-radius: 4px; width: 100%; max-width: 100%; }

/* ── Streaming cursor ── */
.stream-cursor::after { content: '▋'; animation: blink .7s infinite; color: var(--gold); }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

/* ── Bubble content ── */
.bubble p { margin: 5px 0; }
.bubble p:first-child { margin-top: 0; }
.bubble p:last-child  { margin-bottom: 0; }
.bubble strong { color: var(--gold-lt); font-weight: 600; }

/* ── Legal template card ── */
.template-card {
  background: linear-gradient(135deg, rgba(184,146,42,0.06), rgba(184,146,42,0.02));
  border: 1px solid var(--border2);
  border-right: 3px solid var(--gold);
  border-radius: 10px;
  padding: 18px 20px;
  margin: 12px 0;
  font-family: 'Amiri', serif;
  font-size: 14.5px;
  line-height: 2.1;
  white-space: pre-wrap;
  position: relative;
}
.template-card::before {
  content: 'صياغة رسمية';
  position: absolute; top: -10px; right: 16px;
  background: var(--surface); padding: 0 8px;
  font-family: 'Cairo', sans-serif; font-size: 10.5px;
  color: var(--gold); border: 1px solid var(--border2);
  border-radius: 10px; letter-spacing: 0.5px;
}
.template-title {
  font-family: 'Amiri', serif; font-size: 16px; color: var(--gold-lt);
  font-weight: 700; margin-bottom: 10px; padding-bottom: 8px;
  border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px;
}

/* ── Attachments ── */
.att-section { margin: 12px 0; }
.att-header { font-size: 12px; color: var(--gold); font-weight: 600; letter-spacing: 0.8px; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
.att-list { display: flex; flex-direction: column; gap: 5px; }
.att-item { display: flex; align-items: center; gap: 10px; padding: 8px 13px; background: rgba(255,255,255,.025); border: 1px solid rgba(255,255,255,.05); border-radius: 8px; font-size: 13.5px; transition: background .15s; }
.att-item:hover { background: rgba(184,146,42,0.06); }
.att-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--gold); flex-shrink: 0; }

/* ── Fill prompt ── */
.fill-prompt { background: rgba(184,146,42,0.06); border: 1px dashed var(--border2); border-radius: 8px; padding: 10px 14px; font-size: 13px; color: var(--text-dim); margin: 10px 0 0; }

/* ── Typing ── */
.typing-row { display: flex; gap: 10px; padding: 10px 0; animation: fadeUp .22s ease both; }
.typing-bub { background: #141210; border: 1px solid var(--border); border-radius: var(--r); border-top-right-radius: 4px; padding: 12px 16px; display: flex; align-items: center; gap: 9px; }
.typing-txt { font-size: 12.5px; color: var(--muted); }
.dots span { display: inline-block; width: 4px; height: 4px; border-radius: 50%; background: var(--gold); animation: bounce 1.2s infinite; margin: 0 1px; }
.dots span:nth-child(2) { animation-delay: .2s; }
.dots span:nth-child(3) { animation-delay: .4s; }
@keyframes bounce { 0%,80%,100%{transform:scale(1);opacity:.4} 40%{transform:scale(1.7);opacity:1} }

/* ── Input ── */
#input-zone { padding: 12px 24px 18px; background: rgba(10,9,7,.97); border-top: 1px solid var(--border); flex-shrink: 0; }
.input-wrap { display: flex; align-items: flex-end; gap: 9px; background: var(--surface); border: 1px solid var(--border2); border-radius: 12px; padding: 8px 12px; transition: border-color .2s, box-shadow .2s; }
.input-wrap:focus-within { border-color: var(--gold); box-shadow: 0 0 0 3px rgba(184,146,42,0.07); }
#query { flex: 1; background: none; border: none; outline: none; color: var(--text); font-family: 'Cairo', sans-serif; font-size: 14px; line-height: 1.6; resize: none; min-height: 22px; max-height: 140px; overflow-y: auto; direction: rtl; }
#query::placeholder { color: var(--muted); }
#send-btn { width: 34px; height: 34px; border-radius: 8px; background: var(--gold); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: background .2s, transform .1s; }
#send-btn:hover  { background: var(--gold-lt); }
#send-btn:active { transform: scale(.92); }
#send-btn:disabled { opacity: .4; cursor: not-allowed; }
.foot { text-align: center; font-size: 10.5px; color: var(--muted); margin-top: 7px; }

@keyframes fadeUp { from{opacity:0;transform:translateY(7px)} to{opacity:1;transform:translateY(0)} }
</style>
</head>
<body>
<div id="app">

  <!-- ══ Sidebar ══════════════════════════════════════════ -->
  <div id="sidebar">
    <div class="sb-head">
      <span>المحادثات</span>
      <button class="sb-new" onclick="newChat()">+ جديدة</button>
    </div>
    <div id="sessions-list"></div>
  </div>

  <!-- ══ Main ════════════════════════════════════════════ -->
  <div id="shell">
    <header>
      <div class="logo">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#b8922a" stroke-width="1.5" stroke-linecap="round">
          <path d="M12 3L4 7v5c0 4.4 3.4 8.5 8 9.5 4.6-1 8-5.1 8-9.5V7z"/>
          <path d="M9 12l2 2 4-4"/>
        </svg>
      </div>
      <div class="header-text">
        <h1>المساعد القانوني</h1>
        <p>Syrian Legal AI Assistant</p>
      </div>
      <div class="badge">أحوال شخصية · أصول محاكمات</div>
      <button class="toggle-sb" onclick="toggleSidebar()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        المحادثات
      </button>
    </header>

    <div class="disc">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      إخلاء مسؤولية: هذا النظام أداة مساعدة للمحامين ولا يُعدّ رأياً قانونياً رسمياً. يرجى التحقق من المواد القانونية والنصوص الرسمية.
    </div>

    <div id="chat"></div>

    <div id="input-zone">
      <div class="input-wrap">
        <textarea id="query" placeholder="اكتب سؤالك القانوني..." rows="1"
          onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
        <button id="send-btn" onclick="send()">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#0f0e0c" stroke-width="2.5" stroke-linecap="round">
            <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
      <div class="foot">Enter للإرسال · Shift+Enter لسطر جديد</div>
    </div>
  </div>
</div>

<script>
const API = '';  // relative — الواجهة تُخدَّم من نفس السيرفر
let sid          = null;
let sidebarOpen  = true;

// ══ Sidebar ═══════════════════════════════════════════════════
function toggleSidebar() {
  sidebarOpen = !sidebarOpen;
  document.getElementById('sidebar').classList.toggle('collapsed', !sidebarOpen);
  if (sidebarOpen) loadSessions();
}

async function deleteSession(e, sessionId) {
  e.stopPropagation();
  if (!confirm('حذف هذه المحادثة؟')) return;
  try {
    await fetch(`${API}/session/${sessionId}`, { method: 'DELETE' });
    if (sid === sessionId) {
      await initSession();
      document.getElementById('chat').innerHTML = '';
      renderWelcome();
    }
    await loadSessions();
  } catch { alert('تعذّر الحذف'); }
}

async function loadSessions() {
  try {
    const res  = await fetch(`${API}/sessions?limit=30`);
    const data = await res.json();
    const list = document.getElementById('sessions-list');
    list.innerHTML = '';
    data.forEach(s => {
      const el = document.createElement('div');
      el.className = 'sess-item' + (s.session_id === sid ? ' active' : '');
      el.dataset.sid = s.session_id;
      const d = new Date(s.updated_at * 1000);
      const timeStr = d.toLocaleDateString('ar-SY', { month: 'short', day: 'numeric' });
      el.innerHTML = `
        <div class="sess-row">
          <div class="sess-title">${esc(s.title)}</div>
          <button class="sess-del" title="حذف" onclick="deleteSession(event,'${s.session_id}')">✕</button>
        </div>
        <div class="sess-time">${timeStr}</div>`;
      el.onclick = () => loadSession(s.session_id);
      list.appendChild(el);
    });
  } catch { /* server not ready yet */ }
}

async function loadSession(sessionId) {
  sid = sessionId;
  // تحديث active في الـ sidebar
  document.querySelectorAll('.sess-item').forEach(el => {
    el.classList.toggle('active', el.dataset.sid === sid);
  });
  // تحميل تاريخ المحادثة
  try {
    const res  = await fetch(`${API}/session/${sid}/history`);
    const data = await res.json();
    const chat = document.getElementById('chat');
    chat.innerHTML = '';
    if (!data.messages || data.messages.length === 0) {
      renderWelcome(); return;
    }
    data.messages.forEach(msg => {
      if (msg.role === 'user') {
        addUserBubble(msg.content);
      } else {
        addAIBubble({ message: msg.content, intents: [], results: [] });
      }
    });
  } catch { renderWelcome(); }
}

// ══ Session Init ══════════════════════════════════════════════
async function initSession() {
  try {
    const r = await fetch(`${API}/session/new`, { method: 'POST' });
    sid = (await r.json()).session_id;
    await loadSessions();
  } catch {
    sid = 'local-' + Math.random().toString(36).slice(2);
  }
}

async function newChat() {
  await initSession();
  document.getElementById('chat').innerHTML = '';
  renderWelcome();
}

function renderWelcome() {
  const chat = document.getElementById('chat');
  const w    = document.createElement('div');
  w.id       = 'welcome';
  w.innerHTML = `
    <div class="seal"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#b8922a" stroke-width="1.3" stroke-linecap="round"><path d="M12 3L4 7v5c0 4.4 3.4 8.5 8 9.5 4.6-1 8-5.1 8-9.5V7z"/><path d="M8 12h8M12 8v8"/></svg></div>
    <h2>كيف يمكنني مساعدتك؟</h2>
    <p class="sub">اسألني عن صياغة العرائض، المرفقات المطلوبة، أو أي سؤال في القانون السوري.</p>
    <div class="chips">
      <div class="chip" onclick="setQ('بدي صياغة دعوى طلاق خلعي')">📄 دعوى طلاق خلعي</div>
      <div class="chip" onclick="setQ('شو الأوراق المطلوبة لدعوى الحضانة؟')">📎 مرفقات الحضانة</div>
      <div class="chip" onclick="setQ('ما هي شروط الحضانة وأسباب سقوطها؟')">⚖️ شروط الحضانة</div>
      <div class="chip" onclick="setQ('بدي صياغة دعوى نفقة وشو الأوراق؟')">📋 نفقة + مرفقات</div>
      <div class="chip" onclick="setQ('إجراءات تبليغ المدعى عليه')">📬 إجراءات التبليغ</div>
    </div>`;
  chat.appendChild(w);
}

// ══ Helpers ═══════════════════════════════════════════════════
function setQ(t)       { const ta = document.getElementById('query'); ta.value = t; autoResize(ta); ta.focus(); }
function autoResize(ta){ ta.style.height = 'auto'; ta.style.height = Math.min(ta.scrollHeight, 140) + 'px'; }
function handleKey(e)  { if (e.key==='Enter' && !e.shiftKey) { e.preventDefault(); send(); } }
function hideWelcome() { const w = document.getElementById('welcome'); if(w) w.remove(); }
function scrollDown()  { const c = document.getElementById('chat'); setTimeout(() => c.scrollTop=c.scrollHeight, 60); }
function esc(s)        { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ══ Bubbles ════════════════════════════════════════════════════
function addUserBubble(txt) {
  hideWelcome();
  const c = document.getElementById('chat');
  const r = document.createElement('div');
  r.className = 'row user';
  r.innerHTML = `<div class="av us"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div><div class="bubble">${esc(txt)}</div>`;
  c.appendChild(r); scrollDown();
}

function addAIBubble(data) {
  const c   = document.getElementById('chat');
  const r   = document.createElement('div');
  r.className = 'row ai';
  const bub = document.createElement('div');
  bub.className = 'bubble';
  bub.innerHTML = renderAI(data);
  r.innerHTML = `<div class="av ai"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#b8922a" stroke-width="1.5" stroke-linecap="round"><path d="M12 3L4 7v5c0 4.4 3.4 8.5 8 9.5 4.6-1 8-5.1 8-9.5V7z"/><path d="M9 12l2 2 4-4"/></svg></div>`;
  r.appendChild(bub);
  c.appendChild(r); scrollDown();
}

// ── Streaming bubble ───────────────────────────────────────────
function createStreamBubble() {
  hideWelcome();
  const c   = document.getElementById('chat');
  const r   = document.createElement('div');
  r.className = 'row ai'; r.id = 'stream-row';
  const bub = document.createElement('div');
  bub.className = 'bubble stream-cursor'; bub.id = 'stream-bub';
  r.innerHTML = `<div class="av ai"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#b8922a" stroke-width="1.5" stroke-linecap="round"><path d="M12 3L4 7v5c0 4.4 3.4 8.5 8 9.5 4.6-1 8-5.1 8-9.5V7z"/><path d="M9 12l2 2 4-4"/></svg></div>`;
  r.appendChild(bub); c.appendChild(r); scrollDown();
  return bub;
}

function finalizeStreamBubble(bub, data) {
  bub.classList.remove('stream-cursor');
  bub.innerHTML = renderAI(data);
  const row = document.getElementById('stream-row');
  if (row) row.removeAttribute('id');
  scrollDown();
}

function addError(msg) {
  const c = document.getElementById('chat');
  const r = document.createElement('div');
  r.className = 'row ai';
  r.innerHTML = `<div class="av ai"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#b8922a" stroke-width="1.5" stroke-linecap="round"><path d="M12 3L4 7v5c0 4.4 3.4 8.5 8 9.5 4.6-1 8-5.1 8-9.5V7z"/></svg></div><div class="bubble" style="color:#b85050;border-color:rgba(184,80,80,.2)">⚠ ${esc(msg)}</div>`;
  c.appendChild(r); scrollDown();
}

function showTyping() {
  const c = document.getElementById('chat');
  const r = document.createElement('div');
  r.className = 'typing-row'; r.id = 'typing';
  r.innerHTML = `<div class="av ai"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#b8922a" stroke-width="1.5" stroke-linecap="round"><path d="M12 3L4 7v5c0 4.4 3.4 8.5 8 9.5 4.6-1 8-5.1 8-9.5V7z"/></svg></div><div class="typing-bub"><div class="dots"><span></span><span></span><span></span></div><div class="typing-txt">جاري البحث في التشريعات...</div></div>`;
  c.appendChild(r); scrollDown();
}
function hideTyping() { const t = document.getElementById('typing'); if(t) t.remove(); }

// ══ Render AI response ═════════════════════════════════════════
function renderAI(data) {
  const msg      = data.message || '';
  const results  = data.results || [];
  const r0       = results[0] || {};
  const template = r0.template;
  const attachs  = r0.attachments;
  const intents  = data.intents || [];

  const hasTmpl  = template && intents.includes('TEMPLATE');
  const hasAtt   = attachs  && intents.includes('ATTACHMENT') && attachs.attachments && attachs.attachments.length;
  const isFilled = template && template.is_filled;  // flag من الـ backend

  if (!hasTmpl && !hasAtt) return formatText(msg);

  let html = '';

  if (hasTmpl) {
    html += `<div class="template-title">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#d4a843" stroke-width="2" stroke-linecap="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14,2 14,8 20,8"/></svg>
      ${esc(template.title || 'الصياغة القانونية')}
    </div>`;

    if (isFilled) {
      // السيناريو 1 و2: القالب مُعبَّأ — نعرض الـ message كاملاً داخل card
      html += `<div class="template-card">${esc(msg)}</div>`;
    } else {
      // عرض القالب الأصلي مع سؤال التعبئة
      const bodyStart = msg.indexOf('السيد قاضي');
      const body = bodyStart >= 0
        ? msg.substring(bodyStart, msg.indexOf('هل تريد') > 0 ? msg.indexOf('هل تريد') : undefined)
        : (template.formal_text || msg);
      html += `<div class="template-card">${esc(body.trim())}</div>`;
      const fillLine = msg.split('\n').find(l => l.includes('هل تريد') || l.includes('زودني'));
      if (fillLine) html += `<div class="fill-prompt">${esc(fillLine)}</div>`;
    }
  }

  if (hasAtt) {
    html += `<div class="att-section">
      <div class="att-header">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
        المرفقات المطلوبة
      </div>
      <div class="att-list">
        ${attachs.attachments.map(a => `<div class="att-item"><span class="att-dot"></span>${esc(a)}</div>`).join('')}
      </div>
    </div>`;
  }

  // إذا لم يُعرض شيء → نص عادي
  return html || formatText(msg);
}

// تحويل markdown بسيط لـ HTML (آمن — بدون كسر الـ escape)
function formatText(txt) {
  if (!txt) return '';
  return txt.split('\n').map(line => {
    if (!line.trim()) return '<br>';
    // bold: **نص** → <strong>نص</strong>
    const safe = line
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
    return `<p>${safe}</p>`;
  }).join('');
}

// ══ Send ═══════════════════════════════════════════════════════
async function send() {
  const ta  = document.getElementById('query');
  const btn = document.getElementById('send-btn');
  const q   = ta.value.trim();
  if (!q) return;
  if (!sid) await initSession();

  ta.value = ''; ta.style.height = 'auto';
  btn.disabled = true;
  addUserBubble(q);

  try {
    // ── Streaming ──────────────────────────────────────────────
    showTyping();
    const res = await fetch(`${API}/ask`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ query: q, session_id: sid, stream: true }),
    });

    if (!res.ok) throw new Error(`HTTP ${res.status}`);

    hideTyping();
    const streamBub = createStreamBubble();
    let fullText    = '';
    let metaData    = null;

    const reader  = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer    = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop(); // الجزء غير المكتمل

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        try {
          const chunk = JSON.parse(line.slice(6));
          if (chunk.type === 'meta') {
            metaData = chunk;
            sid = chunk.session_id || sid;
          } else if (chunk.type === 'token') {
            fullText += chunk.token;
            streamBub.textContent = fullText;
            scrollDown();
          } else if (chunk.type === 'done') {
            // عرض الرد النهائي بشكل منسّق
            const finalData = {
              message: fullText,
              intents: metaData?.intents || [],
              results: chunk.results || [],
            };
            finalizeStreamBubble(streamBub, finalData);
            loadSessions(); // تحديث قائمة المحادثات
          }
        } catch { /* JSON parse error في chunk غير مكتمل */ }
      }
    }

  } catch(e) {
    hideTyping();
    const sr = document.getElementById('stream-row');
    if (sr) sr.remove();
    addError('تعذّر الاتصال بالخادم. تأكد من تشغيل FastAPI على المنفذ 8000.');
  } finally {
    btn.disabled = false;
    ta.focus();
  }
}

// ══ Start ══════════════════════════════════════════════════════
initSession().then(renderWelcome);
</script>
